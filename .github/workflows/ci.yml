# Continuous integration for accent-fleet-analytics.
#
# Two jobs:
#
#   lint   — ruff over src/, app/, dashboard/, tests/, scripts/. Pure-Python
#            so it stays under a minute.
#
#   test   — installs the package + dev deps and runs pytest. The DB-bound
#            integration tests (tests/test_api_devices.py, the SQL parity
#            tests in tests/test_feature_computation.py) self-skip when no
#            reachable Postgres is configured, so CI never needs a service
#            container to stay green.
#
# Triggers on every push to main and on every pull request. Cancels in-flight
# runs from earlier commits on the same branch so the dashboard reflects the
# tip, not a stale build.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ruff
        run: pip install "ruff>=0.5,<1.0"

      - name: Run ruff
        run: ruff check src app dashboard tests scripts

  test:
    name: test (pytest)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .
          pip install pytest pytest-cov httpx

      - name: Run pytest
        # Exclude the `integration` mark — those tests boot a Prefect flow
        # that requires Postgres. Other DB-touching tests (test_api_devices,
        # SQL parity in test_feature_computation) self-skip via a
        # `db_available` fixture, so they're safe to leave in the default
        # selection. Live integration coverage comes from the docker-compose
        # smoke run in the release workflow.
        run: pytest -ra --maxfail=5 -m "not integration"

  docker:
    name: docker (build base image)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build only the `base` image. Other compose services FROM
      # accent-fleet-base:latest, so this catches any Dockerfile breakage
      # (apt package gone missing, requirements.txt incompatibility, base
      # image tag pulled, ...) without pulling the entire stack up.
      # Layer caching via gha keeps subsequent runs under a minute.
      - name: Build accent-fleet-base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base.Dockerfile
          push: false
          tags: accent-fleet-base:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
