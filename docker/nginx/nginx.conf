# =============================================================================
# nginx reverse proxy for the accent-fleet-analytics stack.
# =============================================================================
# Why this exists:
#   The web app and MLflow UI both listen on plain HTTP with no auth. On a
#   local laptop that's fine; once we put any of this on a public IP it's not.
#   This config fronts both with HTTP Basic Auth and a single TLS termination
#   point. It's deliberately minimal — production deployments should swap in
#   a real OIDC reverse proxy (oauth2-proxy, Authelia, etc.). See NEXT_STEPS.md
#   §2.2 for the v1 plan.
#
# Endpoints exposed:
#   /              -> web (React SPA served by nginx, internal :80)
#   /mlflow/       -> MLflow UI (internal :5000)
#   /api/          -> FastAPI (internal :8000) — auth-PROTECTED; the API has
#                     its own X-API-Key on /admin/* but everything else is
#                     currently open. Putting it behind basic auth keeps the
#                     surface area tight until proper auth lands.
# =============================================================================

worker_processes 1;

events {
  worker_connections 1024;
}

http {
  # Bigger client_max_body_size lets MLflow's "log_artifact" path push
  # multi-MB pickled models through the proxy without 413s.
  client_max_body_size 100M;

  # Don't leak our nginx version in 404s.
  server_tokens off;

  # Compress text/JSON responses but skip already-compressed types.
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  upstream web_upstream    { server web:80;      }
  upstream mlflow_upstream { server mlflow:5000; }
  upstream api_upstream    { server api:8000;    }

  server {
    listen 80;
    server_name _;

    # Single htpasswd file shared by all three locations.
    # Mounted read-only from docker/nginx/htpasswd (generated locally,
    # never committed). See README §Auth-protected stack for setup.
    auth_basic           "accent-fleet-analytics";
    auth_basic_user_file /etc/nginx/htpasswd;

    # ---------------------------------------------------------------------
    # React SPA — the root path.
    # ---------------------------------------------------------------------
    location / {
      proxy_pass         http://web_upstream;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------------------
    # MLflow UI + tracking API. Strip the /mlflow prefix on the way through
    # so MLflow's own URL routing keeps working.
    # ---------------------------------------------------------------------
    location /mlflow/ {
      proxy_pass         http://mlflow_upstream/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---------------------------------------------------------------------
    # FastAPI.
    # ---------------------------------------------------------------------
    location /api/ {
      proxy_pass         http://api_upstream/;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
