# Accent Fleet Analytics — local/Azure-VM compose stack.
#
# Default services (always start):  base, mlflow, api, dashboard, etl
# Optional profiles:
#   --profile localdb   -> spins up a Postgres 16 container for purely local dev.
#                          Skip this on Azure where the DB is hosted externally
#                          (Azure Database for PostgreSQL or another VM).
#   --profile streaming -> spins up Redpanda once Kafka work begins.
#   --profile auth      -> nginx reverse-proxy with HTTP Basic Auth in front.
#   --profile scheduler -> retrain-scheduler service: fires the monthly
#                          silhouette-gated retrain on the first Monday of
#                          each month. Opt-in so dev boxes don't retrain
#                          on a schedule they didn't ask for.
#
# Typical Azure-VM usage:
#   docker compose build base
#   docker compose up -d mlflow api dashboard etl
#   (.env has PG_HOST=<your-server>.postgres.database.azure.com and PG_SSLMODE=require)

services:

  # ---------------------------------------------------------------------------
  # Base image build target. Other services FROM accent-fleet-base:latest.
  # Build once with: docker compose build base
  # ---------------------------------------------------------------------------
  base:
    image: accent-fleet-base:latest
    build:
      context: .
      dockerfile: docker/base.Dockerfile
    # This service exists only to build the shared image. Never started.
    command: ["python", "--version"]
    profiles: ["build-only"]

  # ---------------------------------------------------------------------------
  # OPTIONAL local Postgres. Disabled by default — we use Azure Postgres.
  # Enable with:  docker compose --profile localdb up -d postgres
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: accent_postgres
    restart: unless-stopped
    profiles: ["localdb"]
    environment:
      POSTGRES_DB: ${PG_DATABASE:-accent_fleet}
      POSTGRES_USER: ${PG_USER:-accent}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-accent_dev}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/00_schemas_and_state.sql:/docker-entrypoint-initdb.d/00_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-accent} -d ${PG_DATABASE:-accent_fleet}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [fleet-net]

  # ---------------------------------------------------------------------------
  # MLflow tracking + model registry.
  # File backend, single-writer (only train_clustering.py writes; API reads).
  # ---------------------------------------------------------------------------
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.2
    container_name: accent_mlflow
    restart: unless-stopped
    # `mlflow-artifacts:/` tells clients to upload artifacts THROUGH the server
    # (HTTP), rather than writing to a shared filesystem path. Without proxy
    # mode, the etl/api containers can't write to /mlartifacts because it only
    # exists inside this container. `--serve-artifacts` enables the proxy; the
    # files actually land at `--artifacts-destination` on the server's volume.
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --backend-store-uri sqlite:////mlflow/mlflow.db
        --default-artifact-root mlflow-artifacts:/
        --artifacts-destination /mlartifacts
        --serve-artifacts
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
      - mlflow_artifacts:/mlartifacts
    healthcheck:
      # The official mlflow image doesn't ship curl/wget — use Python's urllib,
      # which is guaranteed to be present. Hit '/' (always served by mlflow ui)
      # rather than '/health' (404 on older mlflow versions).
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/', timeout=3)\" || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks: [fleet-net]

  # ---------------------------------------------------------------------------
  # FastAPI scoring service.
  # ---------------------------------------------------------------------------
  api:
    image: accent-fleet-api:latest
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    container_name: accent_api
    restart: unless-stopped
    env_file: .env
    environment:
      # Make sure the API talks to the in-network MLflow regardless of .env.
      MLFLOW_TRACKING_URI: http://mlflow:5000
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      # Read-only access to model artifacts written by the trainer.
      - ./models:/app/models:ro
    depends_on:
      mlflow:
        condition: service_healthy
    networks: [fleet-net]

  # ---------------------------------------------------------------------------
  # Streamlit dashboard.
  # ---------------------------------------------------------------------------
  dashboard:
    image: accent-fleet-dashboard:latest
    build:
      context: .
      dockerfile: docker/dashboard.Dockerfile
    container_name: accent_dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      API_BASE_URL: http://api:8000
    ports:
      - "${DASHBOARD_PORT:-8501}:8501"
    depends_on:
      api:
        condition: service_healthy
    networks: [fleet-net]

  # ---------------------------------------------------------------------------
  # ETL container. Runs the incremental Prefect flow on a loop.
  # Override CMD for bootstrap/backfill:
  #   docker compose run --rm etl python scripts/run_batch.py bootstrap
  #
  # B7 (post-M6): the etl service connects as `accent_etl` (BYPASSRLS) rather
  # than the same role the API uses (`accent_app`, NOBYPASSRLS). We pull
  # everything else from .env but explicitly override PG_USER / PG_PASSWORD
  # so a single .env file can drive both api + etl with different DB roles.
  # ETL_PG_PASSWORD must be set in .env; the `${VAR:?msg}` form makes
  # `docker compose up etl` fail loudly if it's missing.
  # ---------------------------------------------------------------------------
  etl:
    image: accent-fleet-etl:latest
    build:
      context: .
      dockerfile: docker/etl.Dockerfile
    container_name: accent_etl
    restart: unless-stopped
    env_file: .env
    environment:
      PG_USER: accent_etl
      PG_PASSWORD: ${ETL_PG_PASSWORD:?ETL_PG_PASSWORD missing from .env -- set it to the accent_etl role password before starting the etl service}
    volumes:
      - ./models:/app/models
    networks: [fleet-net]

  # ---------------------------------------------------------------------------
  # Monthly retraining scheduler. Opt-in via `--profile scheduler`. Runs
  # supercronic (cron-compatible, container-friendly) which fires
  # docker/retrain.crontab. The crontab fires every Monday at 04:00 UTC and
  # the wrapper short-circuits unless today is the first Monday of the month,
  # so this container produces exactly one retrain attempt per month.
  #
  # Start in production:
  #   docker compose --profile scheduler up -d retrain-scheduler
  #
  # Inspect what it would do:
  #   docker compose --profile scheduler logs -f retrain-scheduler
  #
  # Ad-hoc retrain (bypasses the schedule + first-Monday gate):
  #   docker compose run --rm etl python scripts/retrain_monthly.py
  # ---------------------------------------------------------------------------
  retrain-scheduler:
    image: accent-fleet-retrain-scheduler:latest
    build:
      context: .
      dockerfile: docker/retrain.Dockerfile
    container_name: accent_retrain_scheduler
    restart: unless-stopped
    profiles: ["scheduler"]
    env_file: .env
    environment:
      # Same MLflow override as api/etl — the .env value typically points at
      # localhost which only works on the host; inside the compose network we
      # must hit the mlflow service by name.
      MLFLOW_TRACKING_URI: http://mlflow:5000
    volumes:
      # Same model artefacts directory as etl so a promoted candidate's local
      # files (kmeans.pkl, scaler.pkl, train_meta.json) appear where the api
      # expects to mount them.
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy
    networks: [fleet-net]

  # ---------------------------------------------------------------------------
  # nginx reverse proxy with HTTP Basic Auth in front of dashboard / mlflow / api.
  # Opt-in via `--profile auth`. Required when the host is reachable outside
  # localhost. See docker/nginx/nginx.conf + README §Auth-protected stack for
  # how to create the htpasswd file before starting this service.
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    container_name: accent_nginx
    restart: unless-stopped
    profiles: ["auth"]
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      - dashboard
      - mlflow
      - api
    networks: [fleet-net]

  # ---------------------------------------------------------------------------
  # Redpanda: Kafka-compatible broker. Enabled when streaming goes live.
  # Start with: docker compose --profile streaming up -d redpanda
  # ---------------------------------------------------------------------------
  redpanda:
    image: redpandadata/redpanda:v24.1.2
    container_name: accent_redpanda
    profiles: ["streaming"]
    command:
      - redpanda
      - start
      - --smp=1
      - --memory=1G
      - --overprovisioned
      - --node-id=0
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    networks: [fleet-net]

networks:
  fleet-net:
    driver: bridge

volumes:
  postgres_data:
  mlflow_data:
  mlflow_artifacts:
