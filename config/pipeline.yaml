# =============================================================================
# Pipeline configuration
# =============================================================================
# Runtime parameters that the pipeline consults. Infrastructure-level settings
# (DB credentials, Kafka brokers) live in .env; analytical settings live here.
# =============================================================================

version: 1

# ---------------------------------------------------------------------------
# Window semantics
# ---------------------------------------------------------------------------
window:
  # How often the batch scheduler wakes up (Prefect schedule / cron).
  incremental_interval_minutes: 5

  # How far back from "now" the incremental run reaches. Must be >=
  # incremental_interval_minutes to handle late-arriving data.
  overlap_minutes: 10

  # For the one-time backfill: process in chunks of this many days.
  # Smaller = more progress checkpoints, larger = faster.
  backfill_chunk_days: 30

  # Hard cutoff before which no data is ever loaded (matches cleaning rule C1).
  min_event_time: "2019-10-01T00:00:00Z"

# ---------------------------------------------------------------------------
# Source tables — staging tables the pipeline watches
# ---------------------------------------------------------------------------
sources:
  - name: path
    time_column: begin_path_time
    target_fact: fact_trip
    priority: 1

  - name: rep_overspeed
    time_column: begin_path_time
    target_fact: fact_overspeed
    priority: 2

  - name: stop
    time_column: stop_start
    target_fact: fact_stop
    priority: 3

  - name: notification
    time_column: created_at
    target_fact: fact_speed_notification
    filter: "description LIKE 'SPEED%'"
    priority: 4

  - name: rep_activity_daily
    time_column: activity_start_time
    target_fact: fact_daily_activity
    priority: 5

  # Archive: high-volume telemetry source (54.7M rows). Drives both
  # fact_harsh_event (event-level) and fact_telemetry_daily (aggregate).
  - name: archive
    time_column: date
    target_fact: fact_harsh_event
    priority: 6

  - name: archive
    time_column: date
    target_fact: fact_telemetry_daily
    priority: 7

  # ---------------------------------------------------------------------------
  # BI-coverage facts (Project 2: Fleet BI Dashboard)
  # ---------------------------------------------------------------------------
  # Full notification coverage (superset of fact_speed_notification — we keep
  # both: speed-only for the stable ML feature contract, full for BI).
  - name: notification
    time_column: created_at
    target_fact: fact_notification
    priority: 8

  # Maintenance header (work-order grain). Vehicle-grain, not device-grain.
  - name: maintenance
    time_column: date_operation
    target_fact: fact_maintenance
    priority: 9

  # Maintenance line items (offense / sinistre / reparation), keyed off the
  # parent maintenance.date_operation watermark.
  - name: maintenance
    time_column: date_operation
    target_fact: fact_maintenance_line
    priority: 10

  # Fueling events from staging.document JOIN staging.fueling.
  - name: document
    time_column: date_operation
    target_fact: fact_fueling
    filter: "doc_type = 'Fueling'"
    priority: 11

# ---------------------------------------------------------------------------
# Archive-derived fact parameters
# ---------------------------------------------------------------------------
# Thresholds applied at LOAD time inside sql/15_fact_harsh_event_incremental.sql
# Units are raw int8 accelerometer readings on a ±2g full-scale sensor:
#   40 ≈ 0.31 g   (moderate)
#   60 ≈ 0.47 g   (high)
#   80 ≈ 0.63 g   (extreme)
# Tune per-tenant after running notebook 03_feature_engineering/03_handle_outliers.ipynb
archive_thresholds:
  brake:   40    # |x| trigger for harsh_brake (negative-x)
  accel:   40    # x trigger for harsh_accel (positive-x)
  corner:  40    # |y| trigger for harsh_corner
  high:    60    # severity tier upper bound
  extreme: 80    # severity tier upper bound

# Telemetry aggregation parameters for sql/16_fact_telemetry_daily_incr.sql
archive_telemetry:
  ping_seconds:       30    # nominal observation cadence
  rpm_high_threshold: 3000  # over-revving threshold

# ---------------------------------------------------------------------------
# Mart recomputation triggers
# ---------------------------------------------------------------------------
# The mart_device_monthly_behavior table is recomputed ONLY for months that
# received new fact rows in this incremental run.
marts:
  device_monthly_behavior:
    recompute_scope: touched_months
    upsert_strategy: merge
    dependent_facts: [fact_trip, fact_overspeed, fact_stop, fact_speed_notification, fact_daily_activity]

  device_monthly_telemetry:
    recompute_scope: touched_months
    upsert_strategy: merge
    dependent_facts: [fact_harsh_event, fact_telemetry_daily]

  # -------------------------------------------------------------------------
  # BI marts (Project 2: Fleet BI Dashboard)
  # -------------------------------------------------------------------------
  fleet_daily:
    # Day-grain executive KPIs — uses :touched_dates not :touched_months.
    recompute_scope: touched_dates
    upsert_strategy: merge
    dependent_facts:
      - fact_trip
      - fact_overspeed
      - fact_stop
      - fact_harsh_event
      - fact_notification
      - fact_maintenance
      - fact_fueling

  vehicle_monthly:
    recompute_scope: touched_months
    upsert_strategy: merge
    dependent_facts:
      - fact_trip
      - fact_maintenance
      - fact_maintenance_line
      - fact_fueling

  tenant_monthly_summary:
    # Roll-up of vehicle_monthly + fleet_daily — must run after both.
    recompute_scope: touched_months
    upsert_strategy: merge
    depends_on_marts: [vehicle_monthly, fleet_daily]

# ---------------------------------------------------------------------------
# Monitoring thresholds
# ---------------------------------------------------------------------------
monitoring:
  freshness:
    # A run is unhealthy if warehouse.fact_trip max event time is older than this.
    fact_trip_max_lag_minutes: 15
    fact_stop_max_lag_minutes: 30

  quality:
    # Per-run thresholds. Exceeding these produces a monitoring alert.
    max_rejection_rate_pct: 5.0
    max_null_rate_pct:
      fact_trip.distance_km: 0.1
      fact_trip.max_speed_kmh: 1.0

  row_counts:
    # Expected min rows per 5-min window during business hours (09:00-18:00 local).
    expected_min_new_trips_per_window: 50
    expected_min_new_stops_per_window: 100

# ---------------------------------------------------------------------------
# Execution
# ---------------------------------------------------------------------------
execution:
  # Batch size for each SQL MERGE / COPY operation.
  batch_size: 50000

  # Maximum concurrent fact loaders inside a single run.
  max_parallel_fact_loaders: 3

  # Retry policy per task.
  retries: 2
  retry_delay_seconds: 30

# ---------------------------------------------------------------------------
# Quarantine
# ---------------------------------------------------------------------------
quarantine:
  # Rows that fail a "reject" cleaning rule are written here for audit.
  enabled: true
  retention_days: 90
