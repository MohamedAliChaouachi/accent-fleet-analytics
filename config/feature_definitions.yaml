# =============================================================================
# Feature definitions for Driver Behavior Scoring (Project P1)
# =============================================================================
# Every feature from v1 Feature Groups 1-6 is declared here. The registry at
# src/accent_fleet/features/registry.py loads this file and exposes a typed
# object for the transforms module to consume.
#
# The grain of every feature is (tenant_id, device_id, year_month).
# =============================================================================

version: 1
grain: [tenant_id, device_id, year_month]
window: monthly
minimum_trips_for_scoring: 5          # used in v_ml_features_driver_behavior
minimum_trips_for_risk: 10            # used in v_device_risk_profile
risk_window_months: 3                 # rolling 3-month window

feature_groups:

  # ---------------------------------------------------------------------------
  - name: trip_volume_patterns
    description: Activity level baseline and trip-length distribution
    features:
      - name: total_trips
        source: fact_trip
        aggregation: count
        importance: high
      - name: total_distance_km
        source: fact_trip
        aggregation: sum
        column: distance_km
        importance: high
      - name: avg_trip_distance_km
        source: fact_trip
        aggregation: avg
        column: distance_km
      - name: avg_trip_duration_minutes
        source: fact_trip
        aggregation: avg
        column: duration_seconds
      - name: avg_fuel_used_l
        source: fact_trip
        aggregation: avg
        column: fuel_used
      - name: stddev_trip_distance
        source: fact_trip
        aggregation: stddev_samp
        column: distance_km
      - name: short_trip_ratio
        source: fact_trip
        aggregation: ratio
        numerator: "is_short_trip = true"
        denominator: "all rows"

  # ---------------------------------------------------------------------------
  - name: speed_behavior
    description: General speed tendency and aggressiveness signals
    features:
      - name: avg_max_speed_kmh
        source: fact_trip
        aggregation: avg
        column: max_speed_kmh
      - name: p95_max_speed
        source: fact_trip
        aggregation: percentile
        column: max_speed_kmh
        quantile: 0.95
      - name: avg_speed_ratio
        source: fact_trip
        aggregation: avg
        column: speed_ratio
      - name: high_speed_trip_ratio
        source: fact_trip
        aggregation: ratio
        numerator: "max_speed_kmh > 100"
        denominator: "all rows"

  # ---------------------------------------------------------------------------
  - name: overspeed_events
    description: Overspeed violation rate and severity distribution
    features:
      - name: overspeed_count
        source: fact_overspeed
        aggregation: count
      - name: overspeed_per_100km
        source: derived
        formula: "overspeed_count / NULLIF(total_distance_km, 0) * 100"
        importance: critical
      - name: overspeed_per_trip
        source: derived
        formula: "overspeed_count / NULLIF(total_trips, 0)"
      - name: overspeed_severity_low
        source: fact_overspeed
        aggregation: count
        filter: "severity = 'low'"
      - name: overspeed_severity_medium
        source: fact_overspeed
        aggregation: count
        filter: "severity = 'medium'"
      - name: overspeed_severity_high
        source: fact_overspeed
        aggregation: count
        filter: "severity = 'high'"
      - name: overspeed_severity_extreme
        source: fact_overspeed
        aggregation: count
        filter: "severity = 'extreme'"
      - name: avg_speed_over_limit
        source: fact_overspeed
        aggregation: avg
        column: speed_over_limit

  # ---------------------------------------------------------------------------
  - name: alerts
    description: Speed alert signals from the notification system (independent channel)
    features:
      - name: speed_alert_count
        source: fact_speed_notification
        aggregation: count
      - name: speed_alert_per_100km
        source: derived
        formula: "speed_alert_count / NULLIF(total_distance_km, 0) * 100"
      - name: highway_alert_count
        source: fact_speed_notification
        aggregation: count
        filter: "alert_type = 'SPEED_HIGHWAY'"
      - name: non_highway_alert_count
        source: fact_speed_notification
        aggregation: count
        filter: "alert_type = 'SPEED_NOT_HIGHWAY'"

  # ---------------------------------------------------------------------------
  - name: stops_idling
    description: Stop and idling patterns - indicators of fuel waste and driving style
    features:
      - name: total_stops
        source: fact_stop
        aggregation: count
      - name: in_path_stop_ratio
        source: fact_stop
        aggregation: ratio
        numerator: "is_in_path = true"
        denominator: "all rows"
      - name: stops_per_trip
        source: derived
        formula: "total_stops / NULLIF(total_trips, 0)"
      - name: micro_stop_count
        source: fact_stop
        aggregation: count
        filter: "stop_type = 'micro'"
      - name: short_stop_count
        source: fact_stop
        aggregation: count
        filter: "stop_type = 'short'"
      - name: medium_stop_count
        source: fact_stop
        aggregation: count
        filter: "stop_type = 'medium'"
      - name: long_stop_count
        source: fact_stop
        aggregation: count
        filter: "stop_type = 'long'"

  # ---------------------------------------------------------------------------
  - name: temporal_patterns
    description: When the driver drives - exposure to risk and fatigue
    features:
      - name: night_trip_ratio
        source: fact_trip
        aggregation: ratio
        numerator: "is_night_trip = true"
        denominator: "all rows"
        importance: high
      - name: weekend_trip_ratio
        source: fact_trip
        aggregation: ratio
        numerator: "is_weekend_trip = true"
        denominator: "all rows"
      - name: rush_hour_trip_ratio
        source: fact_trip
        aggregation: ratio
        numerator: "is_rush_hour_trip = true"
        denominator: "all rows"
      - name: active_days
        source: fact_trip
        aggregation: distinct_count
        column: trip_date
      - name: avg_working_hours
        source: fact_daily_activity
        aggregation: avg
        column: working_hours

  # ---------------------------------------------------------------------------
  - name: harsh_events
    description: >
      Accelerometer-derived harsh-driving events from staging.archive
      (Project 1 core risk signal). Counts and per-100km rates for brakes,
      acceleration and cornering, plus severity tiers.
    features:
      - name: harsh_brake_count
        source: fact_harsh_event
        aggregation: count
        filter: "event_type = 'harsh_brake'"
        importance: critical
      - name: harsh_accel_count
        source: fact_harsh_event
        aggregation: count
        filter: "event_type = 'harsh_accel'"
        importance: high
      - name: harsh_corner_count
        source: fact_harsh_event
        aggregation: count
        filter: "event_type = 'harsh_corner'"
        importance: high
      - name: harsh_event_total
        source: fact_harsh_event
        aggregation: count
        importance: critical
      - name: harsh_moderate_count
        source: fact_harsh_event
        aggregation: count
        filter: "severity = 'moderate'"
      - name: harsh_high_count
        source: fact_harsh_event
        aggregation: count
        filter: "severity = 'high'"
      - name: harsh_extreme_count
        source: fact_harsh_event
        aggregation: count
        filter: "severity = 'extreme'"
      - name: harsh_brake_per_100km
        source: derived
        formula: "harsh_brake_count / NULLIF(total_distance_km, 0) * 100"
        importance: critical
      - name: harsh_accel_per_100km
        source: derived
        formula: "harsh_accel_count / NULLIF(total_distance_km, 0) * 100"
      - name: harsh_corner_per_100km
        source: derived
        formula: "harsh_corner_count / NULLIF(total_distance_km, 0) * 100"
      - name: harsh_events_per_100km
        source: derived
        formula: "harsh_event_total / NULLIF(total_distance_km, 0) * 100"
        importance: critical

  # ---------------------------------------------------------------------------
  - name: telemetry_engine_idling
    description: >
      Engine-on / idling / RPM signals derived from staging.archive pings.
      Idle ratio is a strong predictor of fuel waste and inefficient driving.
    features:
      - name: total_ignition_on_minutes
        source: fact_telemetry_daily
        aggregation: sum
        column: ignition_on_minutes
      - name: total_moving_minutes
        source: fact_telemetry_daily
        aggregation: sum
        column: moving_minutes
      - name: total_idle_minutes
        source: fact_telemetry_daily
        aggregation: sum
        column: idle_minutes
      - name: monthly_idle_ratio
        source: derived
        formula: "total_idle_minutes / NULLIF(total_ignition_on_minutes, 0)"
        importance: high
      - name: active_telemetry_days
        source: fact_telemetry_daily
        aggregation: distinct_count
        column: telemetry_date
      - name: avg_rpm
        source: fact_telemetry_daily
        aggregation: avg
        column: avg_rpm
      - name: max_rpm
        source: fact_telemetry_daily
        aggregation: max
        column: max_rpm
      - name: total_high_rpm_seconds
        source: fact_telemetry_daily
        aggregation: sum
        column: high_rpm_seconds
      - name: high_rpm_minutes_per_day
        source: derived
        formula: "total_high_rpm_seconds / 60.0 / NULLIF(active_telemetry_days, 0)"
      - name: avg_telemetry_speed_kmh
        source: fact_telemetry_daily
        aggregation: avg
        column: avg_speed_kmh
      - name: max_telemetry_speed_kmh
        source: fact_telemetry_daily
        aggregation: max
        column: max_speed_kmh
      - name: total_fuel_used_archive
        source: fact_telemetry_daily
        aggregation: sum
        column: total_fuel_used

# =============================================================================
# Risk Score Model Configuration  (Isolation Forest)
# =============================================================================
# The risk score is produced by an UNSUPERVISED anomaly-detection model, NOT a
# hand-tuned weighted formula. We fit one Isolation Forest per tenant on the
# 13 driver-behavior features below, take the per-row anomaly score
#   raw = -decision_function(X)
# rescale it to [0, 100] using each tenant's fit-time min/max, then bucket the
# result into four risk categories using PER-TENANT quantile thresholds also
# captured at fit time. New scoring requests reuse the stored min/max and
# thresholds; values outside the fit-time range are clipped to [0, 100].
#
# All per-tenant artifacts (scaler, model, raw_min, raw_max, thresholds) are
# bundled into a single MLflow Model Registry version under the name below, so
# rollback is atomic across the whole tenant cohort.
#
# Reference training code: src/accent_fleet/ml/train_risk.py
# Reference inference code: src/accent_fleet/ml/inference.py (RiskPredictor)
# Compat SQL view:          sql/21_v_device_risk_profile.sql
# Fact table:               marts.fact_device_risk_score
# =============================================================================

risk_score_model:
  algorithm: isolation_forest
  mlflow_model_name: device-risk-score
  mlflow_experiment_name: device-risk-score
  mlflow_model_stage: Production
  scale: [0, 100]

  # Hyperparameters — pinned to mirror notebooks/04_modeling/02_anomaly_risk_score.ipynb
  hyperparameters:
    n_estimators: 200
    contamination: auto
    random_state: 42
    n_jobs: -1

  # Minimum device-month rows per tenant to fit a model. Tenants below this
  # threshold are skipped at training time and their devices return HTTP 503
  # at inference (no fallback to a "global" model — per-tenant or nothing).
  min_rows_per_tenant: 50

  # Feature inputs — must match src/accent_fleet/ml/train_risk.py::FEATURES
  # and the columns exposed by marts.v_ml_features_full.
  features:
    - overspeed_per_100km
    - avg_speed_over_limit
    - high_speed_trip_ratio
    - speed_alert_per_100km
    - harsh_brake_per_100km
    - harsh_accel_per_100km
    - harsh_corner_per_100km
    - monthly_idle_ratio
    - high_rpm_minutes_per_day
    - night_trip_ratio
    - rush_hour_trip_ratio
    - stddev_trip_distance
    - short_trip_ratio

  # Rescale anomaly score → [0, 100].
  #   score_0_1 = (raw - raw_min) / (raw_max - raw_min + eps)
  #   score    = clip(score_0_1, 0, 1) * 100
  # raw_min / raw_max are captured per tenant at fit time and stored alongside
  # the model in the bundled artifact.
  rescale:
    strategy: per_tenant_minmax
    epsilon: 1.0e-9
    clip_to_scale: true

  # Per-tenant quantile thresholds, captured at fit time. The four buckets are
  #   low      = [0,   p50)
  #   moderate = [p50, p80)
  #   high     = [p80, p95)
  #   critical = [p95, 100]
  # Boundaries are inclusive on the lower side and exclusive on the upper side
  # except the final bucket which is closed on both ends.
  thresholds:
    strategy: per_tenant_quantile
    quantiles:
      low_to_moderate: 0.50
      moderate_to_high: 0.80
      high_to_critical: 0.95

  categories:
    - { name: low,      order: 0 }
    - { name: moderate, order: 1 }
    - { name: high,     order: 2 }
    - { name: critical, order: 3 }

  # Components returned in the API response are NOT weighted contributions
  # anymore (the IF model has no per-feature weights). They are post-scaler
  # z-scores: components[f] = (x[f] - mean[f]) / std[f]  per tenant.
  # The dashboard's "explain why" chart consumes these to highlight which
  # features are the most anomalous for a given device-month.
  components:
    type: standardized_z_scores
    source: per_tenant_scaler

  # Stability-based promotion gate. A new candidate version is promoted to
  # Production only if BOTH category-mix shifts are within tolerance AND the
  # score-distribution PSI stays under the drift alert threshold.
  promotion_gate:
    max_critical_share_shift_pp: 5.0
    max_high_share_shift_pp: 5.0
    max_score_psi: 0.25
