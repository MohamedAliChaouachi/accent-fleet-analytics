# nginx site config served by docker/web.Dockerfile.
#
# Two responsibilities:
#   1. SPA fallback: every non-asset URL serves /index.html so the React
#      Router can take over client-side. Without this, refreshing on
#      /executive returns 404.
#   2. Reverse proxy /v1/* to the FastAPI service ("api" in compose). The
#      browser sees a single origin, so we don't need CORS on the API.

upstream accent_api {
  # Resolved by Docker DNS inside the fleet-net network.
  server api:8000;
}

server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Build artefacts: cache aggressively, immutable hashes in filenames.
  location /assets/ {
    expires 30d;
    add_header Cache-Control "public, immutable";
    try_files $uri =404;
  }

  # Lightweight liveness endpoint for the container healthcheck.
  location = /healthz {
    access_log off;
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # API passthrough. Keep the /v1 prefix; FastAPI is mounted at /v1/*.
  location /v1/ {
    proxy_pass         http://accent_api;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
  }

  # SPA fallback for every other path.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
